<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Bold Text Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f3f2ef;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 860px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: #1a1a1a;
      text-align: center;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: #1a1a1a;
    }

    textarea {
      width: 100%;
      min-height: 80px;
      padding: 12px 16px;
      font-size: 1rem;
      border: 2px solid #1a1a1a;
      border-radius: 8px;
      resize: vertical;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      color: #1a1a1a;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #0a66c2; }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 20px;
    }

    @media (max-width: 620px) {
      .cards { grid-template-columns: 1fr; }
    }

    .card {
      border: 2px solid;
      border-radius: 10px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card--bold   { border-color: #0a66c2; }
    .card--italic { border-color: #e05a2b; }
    .card--both   { border-color: #2e7d32; }

    .card-label {
      font-size: 0.85rem;
      color: #555;
    }

    .card-output {
      flex: 1;
      font-size: 1.05rem;
      line-height: 1.6;
      color: #1a1a1a;
      word-break: break-word;
      white-space: pre-wrap;
      min-height: 36px;
    }

    .copy-btn {
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      font-size: 0.85rem;
      border: 1.5px solid #ccc;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      color: #1a1a1a;
    }

    .copy-btn:hover { background: #f0f0f0; border-color: #999; }
    .copy-btn.copied { border-color: #2e7d32; color: #2e7d32; }

    .copy-icon {
      width: 14px; height: 14px;
      fill: currentColor;
    }

    footer {
      margin-top: 24px;
      font-size: 0.78rem;
      color: #999;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="container">
  <h2>LinkedIn Text in <strong>FETT</strong> und <em>Kursiv</em></h2>
  <h1>Gib hier deinen Text ein:</h1>
  <textarea id="input" placeholder="Das hier ist ein Test" autofocus></textarea>

  <div class="cards">
    <div class="card card--bold">
      <span class="card-label">Fetter Text:</span>
      <div class="card-output" id="out-bold"></div>
      <button class="copy-btn" data-target="out-bold">
        <svg class="copy-icon" viewBox="0 0 24 24"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/></svg>
        Kopieren
      </button>
    </div>

    <div class="card card--italic">
      <span class="card-label">Kursiver Text:</span>
      <div class="card-output" id="out-italic"></div>
      <button class="copy-btn" data-target="out-italic">
        <svg class="copy-icon" viewBox="0 0 24 24"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/></svg>
        Kopieren
      </button>
    </div>

    <div class="card card--both">
      <span class="card-label">Fett und Kursiv:</span>
      <div class="card-output" id="out-both"></div>
      <button class="copy-btn" data-target="out-both">
        <svg class="copy-icon" viewBox="0 0 24 24"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/></svg>
        Kopieren
      </button>
    </div>
  </div>

  <footer>Nutzt Unicode Mathematical Alphanumeric Symbols – funktioniert überall wo Unicode-Text erlaubt ist (LinkedIn, Twitter, etc.)</footer>
</div>

<script>
  // Unicode Mathematical Sans-Serif Symbols
  // Sans-Serif Bold:        A=U+1D5D4, a=U+1D5EE, 0=U+1D7EC
  // Sans-Serif Italic:      A=U+1D608, a=U+1D622
  // Sans-Serif Bold Italic: A=U+1D63C, a=U+1D656

  const BOLD_UPPER  = 0x1D5D4;
  const BOLD_LOWER  = 0x1D5EE;
  const BOLD_DIGIT  = 0x1D7EC;

  const ITALIC_UPPER = 0x1D608;
  const ITALIC_LOWER = 0x1D622;

  const BOLD_ITALIC_UPPER = 0x1D63C;
  const BOLD_ITALIC_LOWER = 0x1D656;

  function toCodePoint(base, charCode) {
    return String.fromCodePoint(base + charCode);
  }

  function convertChar(ch, mode) {
    const upper = ch >= 'A' && ch <= 'Z';
    const lower = ch >= 'a' && ch <= 'z';
    const digit = ch >= '0' && ch <= '9';

    if (mode === 'bold') {
      if (upper) return toCodePoint(BOLD_UPPER, ch.charCodeAt(0) - 65);
      if (lower) return toCodePoint(BOLD_LOWER, ch.charCodeAt(0) - 97);
      if (digit) return toCodePoint(BOLD_DIGIT, ch.charCodeAt(0) - 48);
    }

    if (mode === 'italic') {
      if (upper) return toCodePoint(ITALIC_UPPER, ch.charCodeAt(0) - 65);
      if (lower) return toCodePoint(ITALIC_LOWER, ch.charCodeAt(0) - 97);
      // digits unchanged in italic
    }

    if (mode === 'boldItalic') {
      if (upper) return toCodePoint(BOLD_ITALIC_UPPER, ch.charCodeAt(0) - 65);
      if (lower) return toCodePoint(BOLD_ITALIC_LOWER, ch.charCodeAt(0) - 97);
      if (digit) return toCodePoint(BOLD_DIGIT, ch.charCodeAt(0) - 48); // bold digits
    }

    return ch; // keep spaces, punctuation, etc.
  }

  function convert(text, mode) {
    return [...text].map(ch => convertChar(ch, mode)).join('');
  }

  const input    = document.getElementById('input');
  const outBold  = document.getElementById('out-bold');
  const outItalic= document.getElementById('out-italic');
  const outBoth  = document.getElementById('out-both');

  function update() {
    const text = input.value;
    outBold.textContent   = convert(text, 'bold');
    outItalic.textContent = convert(text, 'italic');
    outBoth.textContent   = convert(text, 'boldItalic');
  }

  input.addEventListener('input', update);
  update(); // run once on load

  // Copy buttons
  document.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const target = document.getElementById(btn.dataset.target);
      try {
        await navigator.clipboard.writeText(target.textContent);
        btn.classList.add('copied');
        // lastChild is the text node " Kopieren"
        btn.lastChild.nodeValue = ' Kopiert!';
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.lastChild.nodeValue = ' Kopieren';
        }, 1800);
      } catch {
        // fallback
        const range = document.createRange();
        range.selectNode(target);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
        window.getSelection().removeAllRanges();
      }
    });
  });
</script>
</body>
</html>
