<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Bold Text Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f3f2ef;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 860px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: #1a1a1a;
      text-align: center;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: #1a1a1a;
    }

    textarea {
      width: 100%;
      min-height: 80px;
      padding: 12px 16px;
      font-size: 1rem;
      border: 2px solid #1a1a1a;
      border-radius: 8px;
      resize: vertical;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      color: #1a1a1a;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #0a66c2; }

    /* ── Toggle ── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 20px 0 4px;
    }

    .toggle-label {
      font-size: 0.88rem;
      color: #555;
      user-select: none;
      cursor: pointer;
      transition: color 0.2s;
    }

    .toggle-label.active { color: #1a1a1a; font-weight: 600; }

    .toggle-track {
      position: relative;
      width: 48px;
      height: 26px;
      background: #0a66c2;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.25s;
      flex-shrink: 0;
    }

    .toggle-track.serif { background: #7b5ea7; }

    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.25s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    .toggle-track.serif .toggle-thumb { transform: translateX(22px); }

    /* ── Cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 16px;
    }

    @media (max-width: 620px) {
      .cards { grid-template-columns: 1fr; }
    }

    .card {
      border: 2px solid;
      border-radius: 10px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card--bold   { border-color: #0a66c2; }
    .card--italic { border-color: #e05a2b; }
    .card--both   { border-color: #2e7d32; }

    .card-label {
      font-size: 0.85rem;
      color: #555;
    }

    .card-output {
      flex: 1;
      font-size: 1.05rem;
      line-height: 1.6;
      color: #1a1a1a;
      word-break: break-word;
      white-space: pre-wrap;
      min-height: 36px;
    }

    .copy-btn {
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      font-size: 0.85rem;
      border: 1.5px solid #ccc;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      color: #1a1a1a;
    }

    .copy-btn:hover { background: #f0f0f0; border-color: #999; }
    .copy-btn.copied { border-color: #2e7d32; color: #2e7d32; }

    .copy-icon { width: 14px; height: 14px; fill: currentColor; }

    footer {
      margin-top: 24px;
      font-size: 0.78rem;
      color: #999;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="container">
  <h2>LinkedIn Text in <strong>FETT</strong> und <em>Kursiv</em></h2>
  <h1>Gib hier deinen Text ein:</h1>
  <textarea id="input" placeholder="Das hier ist ein Test" autofocus></textarea>

  <!-- Toggle -->
  <div class="toggle-row">
    <span class="toggle-label active" id="label-sans">Sans-Serif</span>
    <div class="toggle-track" id="toggle" role="switch" aria-checked="false" tabindex="0" title="Schriftstil wechseln">
      <div class="toggle-thumb"></div>
    </div>
    <span class="toggle-label" id="label-serif">Serif</span>
  </div>

  <div class="cards">
    <div class="card card--bold">
      <span class="card-label">Fetter Text:</span>
      <div class="card-output" id="out-bold"></div>
      <button class="copy-btn" data-target="out-bold">
        <svg class="copy-icon" viewBox="0 0 24 24"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/></svg>
        Kopieren
      </button>
    </div>

    <div class="card card--italic">
      <span class="card-label">Kursiver Text:</span>
      <div class="card-output" id="out-italic"></div>
      <button class="copy-btn" data-target="out-italic">
        <svg class="copy-icon" viewBox="0 0 24 24"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/></svg>
        Kopieren
      </button>
    </div>

    <div class="card card--both">
      <span class="card-label">Fett und Kursiv:</span>
      <div class="card-output" id="out-both"></div>
      <button class="copy-btn" data-target="out-both">
        <svg class="copy-icon" viewBox="0 0 24 24"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/></svg>
        Kopieren
      </button>
    </div>
  </div>

  <footer>Nutzt Unicode Mathematical Alphanumeric Symbols – funktioniert überall wo Unicode-Text erlaubt ist (LinkedIn, Twitter, etc.)</footer>
</div>

<script>
  // ── Unicode code-point bases ──────────────────────────────────
  const RANGES = {
    sansSerif: {
      boldUpper: 0x1D5D4, boldLower: 0x1D5EE, boldDigit: 0x1D7EC,
      italicUpper: 0x1D608, italicLower: 0x1D622,
      boldItalicUpper: 0x1D63C, boldItalicLower: 0x1D656,
    },
    serif: {
      boldUpper: 0x1D400, boldLower: 0x1D41A, boldDigit: 0x1D7CE,
      italicUpper: 0x1D434, italicLower: 0x1D44E,
      boldItalicUpper: 0x1D468, boldItalicLower: 0x1D482,
    }
  };

  let style = 'sansSerif'; // current style

  function cp(base, offset) { return String.fromCodePoint(base + offset); }

  function convertChar(ch, mode) {
    const r = RANGES[style];
    const upper = ch >= 'A' && ch <= 'Z';
    const lower = ch >= 'a' && ch <= 'z';
    const digit = ch >= '0' && ch <= '9';
    const u = ch.charCodeAt(0);

    if (mode === 'bold') {
      if (upper) return cp(r.boldUpper, u - 65);
      if (lower) return cp(r.boldLower, u - 97);
      if (digit) return cp(r.boldDigit, u - 48);
    }
    if (mode === 'italic') {
      // Serif italic has two missing code-points; use workarounds
      if (style === 'serif') {
        if (ch === 'h') return '\u210E';
        if (ch === 'I') return '\u2110';
      }
      if (upper) return cp(r.italicUpper, u - 65);
      if (lower) return cp(r.italicLower, u - 97);
    }
    if (mode === 'boldItalic') {
      if (upper) return cp(r.boldItalicUpper, u - 65);
      if (lower) return cp(r.boldItalicLower, u - 97);
      if (digit) return cp(r.boldDigit, u - 48);
    }
    return ch;
  }

  function convert(text, mode) {
    return [...text].map(ch => convertChar(ch, mode)).join('');
  }

  // ── DOM refs ──────────────────────────────────────────────────
  const input     = document.getElementById('input');
  const outBold   = document.getElementById('out-bold');
  const outItalic = document.getElementById('out-italic');
  const outBoth   = document.getElementById('out-both');
  const toggle    = document.getElementById('toggle');
  const labelSans = document.getElementById('label-sans');
  const labelSerif= document.getElementById('label-serif');

  function update() {
    const text = input.value;
    outBold.textContent   = convert(text, 'bold');
    outItalic.textContent = convert(text, 'italic');
    outBoth.textContent   = convert(text, 'boldItalic');
  }

  // ── Toggle logic ──────────────────────────────────────────────
  function setStyle(newStyle) {
    style = newStyle;
    const isSerif = style === 'serif';
    toggle.classList.toggle('serif', isSerif);
    toggle.setAttribute('aria-checked', isSerif);
    labelSans.classList.toggle('active', !isSerif);
    labelSerif.classList.toggle('active', isSerif);
    update();
  }

  toggle.addEventListener('click', () => setStyle(style === 'sansSerif' ? 'serif' : 'sansSerif'));
  toggle.addEventListener('keydown', e => { if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggle.click(); }});
  labelSans.addEventListener('click', () => setStyle('sansSerif'));
  labelSerif.addEventListener('click', () => setStyle('serif'));

  input.addEventListener('input', update);
  update();

  // ── Copy buttons ──────────────────────────────────────────────
  document.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const target = document.getElementById(btn.dataset.target);
      try {
        await navigator.clipboard.writeText(target.textContent);
        btn.classList.add('copied');
        btn.lastChild.nodeValue = ' Kopiert!';
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.lastChild.nodeValue = ' Kopieren';
        }, 1800);
      } catch {
        const range = document.createRange();
        range.selectNode(target);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
        window.getSelection().removeAllRanges();
      }
    });
  });
</script>
</body>
</html>
